name: Build Geode Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Project
        run: |
          find . -name "*.zip" -exec unzip -o {} -d . \; || true
          find . -name "mod.json" -exec dirname {} \; | while read dir; do
            if [ "$dir" != "." ]; then
              cp -r "$dir"/* . || true
            fi
          done

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          bindings: geode-sdk/bindings
          android: true
          
